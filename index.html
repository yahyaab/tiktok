<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion à TikTok</title>
    <style>
        /* CSS Reset & Styles Généraux */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            color: #000000;
        }

        /* Zone de Contenu Principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        /* Titre */
        h1 {
            font-size: 34px;
            font-weight: 700;
            margin-top: 80px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Bouton de Connexion */
        .login-btn {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f1f2;
            border: 1px solid rgba(22, 24, 35, 0.03);
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #161823;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .login-btn:hover {
            background-color: #e5e5e6;
        }

        .login-btn svg {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            fill: #161823;
        }

        /* Texte Légal (Conditions et Confidentialité) */
        .legal-text {
            margin-top: auto; 
            max-width: 360px;
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
            color: #8a8b91;
            margin-bottom: 24px;
        }

        .legal-text a {
            color: #2c5282; 
            text-decoration: none;
            font-weight: 600;
        }

        .legal-text a:hover {
            text-decoration: underline;
        }

        /* Pied de page fixe */
        .footer {
            height: 64px;
            background-color: #f8f8f8;
            border-top: 1px solid rgba(22, 24, 35, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            color: #8a8b91; 
        }

        .footer a {
            color: #fe2c55; /* Rouge signature brand */
            text-decoration: none;
            margin-left: 6px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Connexion à TikTok</h1>
        
        <button class="login-btn" id="emailBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/>
            </svg>
            Utiliser un e-mail / nom d'utilisateur
        </button>

        <div class="legal-text">
            En continuant avec votre compte, vous acceptez nos <a href="#">Conditions d'utilisation</a> et confirmez avoir lu notre <a href="#">Politique de confidentialité</a>.
        </div>
    </div>

    <div class="footer">
        Vous n'avez pas de compte ? <a href="#">Inscription</a>
    </div>

    <script>
        // Redirection vers index1.html au clic
        document.getElementById('emailBtn').addEventListener('click', function() {
            window.location.href = "index1.html";
        });
    </script>

</body>
</html>
